<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUET Basics + New MCQs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;min-height:100vh}
.app{max-width:800px;margin:0 auto;padding:1rem}
.header{background:linear-gradient(135deg,#1565C0,#0d47a1);color:white;padding:1.3rem;border-radius:14px;margin-bottom:1rem;text-align:center}
.header h1{font-size:21px;margin-bottom:3px}
.header p{font-size:12px;opacity:.85}

/* NAV TABS */
.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.nav-tab{padding:8px 16px;border-radius:99px;border:2px solid #1565C0;font-size:13px;font-weight:bold;cursor:pointer;background:white;color:#1565C0;transition:all .2s}
.nav-tab.active,.nav-tab:hover{background:#1565C0;color:white}

/* SECTIONS */
.section{display:none}
.section.active{display:block}

/* FORMULA CARDS */
.formula-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:1rem}
.f-card{background:white;border-radius:10px;padding:1rem;box-shadow:0 2px 6px rgba(0,0,0,.08);border-left:4px solid #1565C0}
.f-subject{font-size:11px;font-weight:bold;color:#1565C0;margin-bottom:4px;text-transform:uppercase}
.f-formula{font-size:17px;font-weight:bold;color:#222;margin-bottom:4px;font-family:monospace}
.f-name{font-size:13px;color:#555}
.f-trick{font-size:12px;color:#E65100;margin-top:6px;background:#FFF3E0;padding:4px 8px;border-radius:6px}

/* MCQ SECTION */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-box{background:white;border-radius:10px;padding:.7rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.stat-num{font-size:22px;font-weight:bold;color:#1565C0}
.stat-num.green{color:#2e7d32}
.stat-label{font-size:11px;color:#666;margin-top:2px}
.prog-wrap{background:#ddd;border-radius:99px;height:7px;margin-bottom:1rem;overflow:hidden}
.prog-fill{height:100%;background:#1565C0;border-radius:99px;transition:width .4s}

.subject-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.s-tab{padding:7px 14px;border-radius:99px;border:2px solid #1565C0;font-size:12px;font-weight:bold;cursor:pointer;background:white;color:#1565C0}
.s-tab.active{background:#1565C0;color:white}

.q-card{background:white;border-radius:12px;padding:1.2rem;margin-bottom:.8rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.badge{background:#E3F2FD;color:#1565C0;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:bold}
.diff-badge{padding:3px 8px;border-radius:99px;font-size:10px;font-weight:bold}
.diff-easy{background:#E8F5E9;color:#2e7d32}
.diff-medium{background:#FFF3E0;color:#E65100}
.diff-hard{background:#FFEBEE;color:#c62828}
.q-text{font-size:15px;color:#222;line-height:1.6;margin-bottom:.9rem;font-weight:500}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{text-align:left;padding:10px 14px;border-radius:8px;border:2px solid #ddd;background:white;color:#333;font-size:14px;cursor:pointer;transition:all .15s}
.opt:hover{border-color:#1565C0;background:#E3F2FD}
.opt.correct{background:#E8F5E9;border-color:#2e7d32;color:#1b5e20;font-weight:bold}
.opt.wrong{background:#FFEBEE;border-color:#c62828;color:#b71c1c}
.trick-box{display:none;margin-top:.9rem;padding:11px 14px;background:#FFF8E1;border-left:4px solid #F9A825;border-radius:6px}
.trick-title{font-size:12px;font-weight:bold;color:#E65100;margin-bottom:5px}
.trick-body{font-size:13px;color:#444;line-height:1.7}
.shortcut-pill{display:inline-block;margin-top:7px;background:#1565C0;color:white;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:bold}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:.7rem}
.q-counter{font-size:12px;color:#888}
.next-btn{display:none;padding:9px 20px;border-radius:8px;border:none;background:#1565C0;color:white;font-size:14px;font-weight:bold;cursor:pointer}
.score-card{background:white;border-radius:12px;padding:2.5rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.score-big{font-size:56px;font-weight:bold;color:#1565C0}
.score-msg{font-size:16px;color:#444;margin:.5rem 0 1rem}
.retry-btn{padding:10px 26px;border-radius:8px;border:none;background:#1565C0;color:white;font-size:14px;font-weight:bold;cursor:pointer;margin:4px}
.back-btn{padding:10px 26px;border-radius:8px;border:2px solid #1565C0;background:white;color:#1565C0;font-size:14px;font-weight:bold;cursor:pointer;margin:4px}
.hidden{display:none!important}

/* FORMULA SEARCH */
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:2px solid #ddd;font-size:14px;margin-bottom:1rem}
.search-box:focus{outline:none;border-color:#1565C0}
.section-title{font-size:16px;font-weight:bold;color:#1565C0;margin-bottom:.8rem;padding-bottom:6px;border-bottom:2px solid #E3F2FD}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <h1>MUET Complete Preparation Kit</h1>
  <p>Important Formulas + New MCQs + Basics — Everything in one place</p>
</div>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showSection('formulas')">📋 Key Formulas</button>
  <button class="nav-tab" onclick="showSection('mcq')">🎯 New MCQs</button>
  <button class="nav-tab" onclick="showSection('basics')">📖 Quick Basics</button>
</div>

<!-- ===== FORMULAS SECTION ===== -->
<div class="section active" id="sec-formulas">
  <input class="search-box" type="text" placeholder="Search formula (e.g. KE, Ohm, log...)" oninput="filterFormulas(this.value)" id="fsearch">
  <div id="formula-container"></div>
</div>

<!-- ===== MCQ SECTION ===== -->
<div class="section" id="sec-mcq">
  <div class="subject-tabs">
    <button class="s-tab active" onclick="goSub(0)">⚡ Physics</button>
    <button class="s-tab" onclick="goSub(1)">📐 Maths</button>
    <button class="s-tab" onclick="goSub(2)">🧪 Chemistry</button>
    <button class="s-tab" onclick="goSub(3)">📝 English</button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="s-att">0/20</div><div class="stat-label">Attempted</div></div>
    <div class="stat-box"><div class="stat-num green" id="s-cor">0</div><div class="stat-label">Correct</div></div>
    <div class="stat-box"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">Score</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div id="quiz-area"></div>
  <div id="score-area" class="hidden"></div>
</div>

<!-- ===== BASICS SECTION ===== -->
<div class="section" id="sec-basics">
  <div id="basics-container"></div>
</div>

</div>

<script>
// ============ FORMULAS DATA ============
const FORMULAS = [
  // PHYSICS
  {sub:"Physics",name:"Newton's 2nd Law",formula:"F = ma",trick:"F=ma: Force, mass, acceleration — alphabetical!"},
  {sub:"Physics",name:"Kinetic Energy",formula:"KE = ½mv²",trick:"Must have BOTH ½ AND v² — both or wrong!"},
  {sub:"Physics",name:"Potential Energy",formula:"PE = mgh",trick:"Spot 'h' (height) in options = PE formula"},
  {sub:"Physics",name:"Work Done",formula:"W = Fd cosθ",trick:"cosθ always included — angle matters!"},
  {sub:"Physics",name:"Power",formula:"P = W/t",trick:"Faster work = more power → time on bottom"},
  {sub:"Physics",name:"Ohm's Law",formula:"V = IR",trick:"VIR like a word — V=I×R"},
  {sub:"Physics",name:"Momentum",formula:"p = mv",trick:"p for momentum: mass × velocity"},
  {sub:"Physics",name:"Density",formula:"D = M/V",trick:"Mass on TOP, Volume on bottom"},
  {sub:"Physics",name:"Wave Speed",formula:"v = λf",trick:"MULTIPLY wavelength and frequency"},
  {sub:"Physics",name:"Gravitational Acc.",formula:"g = 9.8 m/s²",trick:"Trap = 8.9 (reversed). Correct = 9.8"},
  {sub:"Physics",name:"Speed of Light",formula:"c = 3×10⁸ m/s",trick:"Exponent is 8. Always 8!"},
  {sub:"Physics",name:"Speed of Sound",formula:"v = 343 m/s (air)",trick:"Pattern 3-4-3. Easy to remember!"},
  // MATHS
  {sub:"Maths",name:"Pythagorean Identity",formula:"sin²θ + cos²θ = 1",trick:"Always 1. No exception ever!"},
  {sub:"Maths",name:"Pythagorean Theorem",formula:"a² + b² = c²",trick:"Test: 3²+4²=5² → 9+16=25 ✓"},
  {sub:"Maths",name:"Quadratic Formula",formula:"x = (-b ± √(b²-4ac)) / 2a",trick:"Three checks: -b, ± symbol, /2a"},
  {sub:"Maths",name:"Power Rule (Derivative)",formula:"d/dx xⁿ = nxⁿ⁻¹",trick:"Bring power down, minus 1. x⁵→5x⁴"},
  {sub:"Maths",name:"Derivative of sin(x)",formula:"d/dx sin(x) = cos(x)",trick:"Circle: sin→cos→-sin→-cos→sin"},
  {sub:"Maths",name:"Derivative of cos(x)",formula:"d/dx cos(x) = -sin(x)",trick:"cos→-sin (negative sign!)"},
  {sub:"Maths",name:"Integral of cos(x)",formula:"∫cos(x)dx = sin(x)+C",trick:"Reverse derivative. Always +C!"},
  {sub:"Maths",name:"Binomial Square",formula:"(a+b)² = a²+2ab+b²",trick:"2ab in middle — most forgotten!"},
  {sub:"Maths",name:"Log Base 10",formula:"log₁₀(10ⁿ) = n",trick:"Count zeros → that's the log!"},
  {sub:"Maths",name:"Area of Circle",formula:"A = πr²",trick:"Area=r squared (2D). Circ=2πr (1D)"},
  {sub:"Maths",name:"Slope Formula",formula:"m = (y₂-y₁)/(x₂-x₁)",trick:"Rise/Run. Y on top, X on bottom!"},
  {sub:"Maths",name:"tan(45°)",formula:"tan(45°) = 1",trick:"Equal sides → equal/equal = 1"},
  {sub:"Maths",name:"sin(30°)",formula:"sin(30°) = 1/2",trick:"sin(30)=½, sin(45)=√2/2, sin(60)=√3/2"},
  {sub:"Maths",name:"Determinant 2×2",formula:"det[[a,b],[c,d]] = ad-bc",trick:"Cross multiply then subtract!"},
  // CHEMISTRY
  {sub:"Chemistry",name:"Moles Formula",formula:"moles = mass / molar mass",trick:"DIVIDE to get moles!"},
  {sub:"Chemistry",name:"OIL RIG Rule",formula:"Oxidation=Loss, Reduction=Gain",trick:"OIL RIG — most important chem trick!"},
  {sub:"Chemistry",name:"Water Formula",formula:"H₂O",trick:"2H + 1O. Not H₂O₂ (that's peroxide)!"},
  {sub:"Chemistry",name:"Ammonia",formula:"NH₃",trick:"N + 3H. Fertiliser smell!"},
  {sub:"Chemistry",name:"Glucose",formula:"C₆H₁₂O₆",trick:"6-12-6 pattern. Easy!"},
  {sub:"Chemistry",name:"Rust",formula:"Fe₂O₃",trick:"2-3 pattern: 2 Fe, 3 O"},
  {sub:"Chemistry",name:"Carbon Dioxide",formula:"CO₂",trick:"1 Carbon, 2 Oxygens"},
  {sub:"Chemistry",name:"Sulphuric Acid",formula:"H₂SO₄",trick:"Strongest common acid. Car battery!"},
  {sub:"Chemistry",name:"Baking Soda",formula:"NaHCO₃",trick:"Has H. Washing Soda=Na₂CO₃ (no H)"},
  {sub:"Chemistry",name:"Ethanol",formula:"C₂H₅OH",trick:"Eth=2C. Meth=1C, Prop=3C, But=4C"},
  {sub:"Chemistry",name:"Avogadro's Number",formula:"6.022 × 10²³",trick:"Exponent is 23. Not 22, not 24!"},
  {sub:"Chemistry",name:"Ozone",formula:"O₃",trick:"O₂=breathe. O₃=ozone layer"},
];

// ============ MCQ DATA (NEW QUESTIONS) ============
const MCQ = {
  Physics:[
    {q:"A car of mass 1000 kg accelerates at 2 m/s². What force acts on it?",opts:["500 N","1000 N","2000 N","3000 N"],ans:2,diff:"easy",
    trick:"CONCEPT: Use F=ma directly. F = 1000 × 2 = 2000 N. Whenever mass and acceleration are given — multiply them for force!",shortcut:"F=ma → just multiply mass × acceleration. 1000×2=2000 N!"},

    {q:"Which of the following is a scalar quantity?",opts:["Force","Velocity","Acceleration","Speed"],ans:3,diff:"easy",
    trick:"CONCEPT: Scalar = magnitude only (no direction). Vector = magnitude + direction. Speed = how fast (no direction). Velocity = speed WITH direction. Speed is scalar!",shortcut:"Speed=scalar (no direction). Velocity=vector (has direction). Key difference!"},

    {q:"The unit of work is the same as the unit of:",opts:["Force","Power","Energy","Momentum"],ans:2,
    diff:"easy",trick:"CONCEPT: Work = Force × distance = Joules. Energy is also measured in Joules. Work done ON an object = energy transferred TO it. Same unit = same concept.",shortcut:"Work unit = Energy unit = Joule (J). They are essentially the same thing!"},

    {q:"When an object is in free fall, which force acts on it?",opts:["No force","Gravity only","Gravity + air resistance","Magnetic force"],ans:1,diff:"easy",
    trick:"CONCEPT: 'Free fall' by definition means ONLY gravity acts — no air resistance, no other forces. In reality there is air resistance, but 'free fall' in physics = gravity only.",shortcut:"Free fall = gravity ONLY. The word 'free' means no other forces!"},

    {q:"Increasing the length of a wire — its resistance will:",opts:["Decrease","Stay same","Increase","Become zero"],ans:2,diff:"medium",
    trick:"CONCEPT: R = ρL/A. Resistance is PROPORTIONAL to length. Longer wire = more material for electrons to pass through = more resistance. Like a longer pipe with more friction.",shortcut:"Longer wire → more resistance. R ∝ L. They increase together!"},

    {q:"A wave has frequency 50 Hz and wavelength 4 m. What is its speed?",opts:["12.5 m/s","54 m/s","200 m/s","46 m/s"],ans:2,diff:"medium",
    trick:"CONCEPT: v = λf. Speed = wavelength × frequency. Just multiply! 4 × 50 = 200 m/s. When you see λ and f given — always multiply them.",shortcut:"v=λf. Multiply: 4×50=200 m/s. Always multiply wavelength×frequency!"},

    {q:"An object at rest stays at rest unless acted upon by a force. This is Newton's:",opts:["1st Law","2nd Law","3rd Law","Law of Gravitation"],ans:0,diff:"easy",
    trick:"CONCEPT: Newton's 1st Law = Law of Inertia = objects resist change in motion. 'At rest stays at rest, in motion stays in motion' — unless a force acts.",shortcut:"Rest stays rest = Newton's 1st Law = Inertia. No force needed to stay still!"},

    {q:"The process of converting AC to DC is called:",opts:["Amplification","Rectification","Induction","Modulation"],ans:1,diff:"medium",
    trick:"CONCEPT: Rectification = making current flow in one direction (DC). 'Rectify' means to correct or straighten. AC alternates direction — rectifier straightens it to DC.",shortcut:"AC→DC = Rectification. 'Rectify' = straighten the current!"},

    {q:"Which type of lens is used in a magnifying glass?",opts:["Concave","Convex","Plane","Bifocal"],ans:1,diff:"easy",
    trick:"CONCEPT: Magnifying glass makes things appear BIGGER = converges light = CONVEX lens. Concave lens makes things smaller (used for short-sight correction). Convex = magnify!",shortcut:"Magnifying glass = Convex lens. Convex=bigger. Concave=smaller!"},

    {q:"What is the power of a machine that does 500 J of work in 10 seconds?",opts:["5 W","50 W","500 W","5000 W"],ans:1,diff:"easy",
    trick:"CONCEPT: P = W/t. Power = Work ÷ Time. 500 ÷ 10 = 50 W. Whenever work and time are given — divide work by time for power.",shortcut:"P=W/t. Divide: 500÷10=50 W. Work divided by time!"},

    {q:"What happens to pressure when depth in a liquid increases?",opts:["Decreases","Stays same","Increases","Becomes zero"],ans:2,diff:"easy",
    trick:"CONCEPT: P = ρgh. Pressure depends on depth (h). Deeper = more liquid above pushing down = more pressure. That's why deep sea is under massive pressure.",shortcut:"Deeper=more pressure. P=ρgh. Depth and pressure increase together!"},

    {q:"Which colour of light has the highest frequency?",opts:["Red","Green","Yellow","Violet"],ans:3,diff:"medium",
    trick:"CONCEPT: VIBGYOR (Violet to Red). Violet has shortest wavelength = highest frequency. Red has longest wavelength = lowest frequency. Remember: V (violet) = very high frequency!",shortcut:"VIBGYOR: Violet=highest freq, Red=lowest. V for Very high, R for Really low!"},

    {q:"Total internal reflection occurs when light goes from:",opts:["Air to glass","Glass to air at critical angle","Water to vacuum","Vacuum to water"],ans:1,diff:"hard",
    trick:"CONCEPT: Total internal reflection happens when light travels from denser to rarer medium AND hits at or beyond the critical angle. Glass→air (denser to rarer) at critical angle = total reflection.",shortcut:"Dense→Rare medium at critical angle = Total Internal Reflection!"},

    {q:"The SI unit of electric charge is:",opts:["Ampere","Volt","Coulomb","Watt"],ans:2,diff:"easy",
    trick:"CONCEPT: Charles-Augustin de Coulomb studied electric charge — unit named after him. Current (Ampere) = charge per second. Charge = Coulombs. 1A = 1 Coulomb/second.",shortcut:"Electric charge = Coulomb (C). Current = Ampere = Coulombs per second!"},

    {q:"An echo is produced due to:",opts:["Refraction","Reflection","Diffraction","Absorption"],ans:1,diff:"easy",
    trick:"CONCEPT: Echo = sound bouncing back from a hard surface = REFLECTION of sound. When sound hits a wall and bounces back to your ears, you hear the echo.",shortcut:"Echo = reflection of sound. Sound bounces back = echo!"},

    {q:"What is the efficiency of a machine that takes 1000 J and gives 800 J useful work?",opts:["80%","20%","800%","125%"],ans:0,diff:"medium",
    trick:"CONCEPT: Efficiency = (useful output / total input) × 100. 800/1000 × 100 = 80%. Always: output on top, input on bottom, multiply by 100 for percentage.",shortcut:"Efficiency = (output/input)×100. 800/1000×100 = 80%!"},

    {q:"Which of the following is NOT a renewable energy source?",opts:["Solar","Wind","Natural gas","Hydroelectric"],ans:2,diff:"easy",
    trick:"CONCEPT: Renewable = naturally replenished (sun, wind, water flow). Non-renewable = runs out (coal, oil, natural gas, nuclear). Natural gas is fossil fuel = non-renewable.",shortcut:"Solar/Wind/Hydro=renewable. Coal/Oil/Gas=non-renewable. Gas is non-renewable!"},

    {q:"What is the focal length of a plane mirror?",opts:["Zero","Infinity","Equal to radius","Negative"],ans:1,diff:"hard",
    trick:"CONCEPT: A plane (flat) mirror has no curvature — parallel rays never converge after reflection. The focal point is at infinity. Unlike curved mirrors, it doesn't focus light.",shortcut:"Plane mirror focal length = infinity. Flat surface = no focusing = ∞!"},

    {q:"A 60W bulb runs for 2 hours. How much energy does it use?",opts:["30 J","120 J","432000 J","720 J"],ans:2,diff:"medium",
    trick:"CONCEPT: Energy = Power × Time. But time must be in SECONDS! 2 hours = 2×3600 = 7200 s. Energy = 60 × 7200 = 432000 J. Always convert hours to seconds!",shortcut:"E=P×t. Convert hours→seconds first! 60W × 7200s = 432000 J"},

    {q:"The splitting of white light into colours by a prism is called:",opts:["Reflection","Refraction","Dispersion","Diffraction"],ans:2,diff:"easy",
    trick:"CONCEPT: Dispersion = white light splitting into VIBGYOR colours. Each colour has different wavelength → bends at different angle in prism → rainbow appears. Dispersion!",shortcut:"White light splits into colours = Dispersion. Rainbow = dispersion!"},
  ],

  Maths:[
    {q:"Solve: 2x + 6 = 14. Find x.",opts:["3","4","5","6"],ans:1,diff:"easy",
    trick:"CONCEPT: Isolate x. Step 1: subtract 6 from both sides → 2x = 8. Step 2: divide by 2 → x = 4. Always: move numbers to one side, variable to the other.",shortcut:"2x+6=14 → 2x=8 → x=4. Move 6, then divide by 2!"},

    {q:"What is 15% of 200?",opts:["15","25","30","35"],ans:2,diff:"easy",
    trick:"CONCEPT: Percentage trick: 15% = 15/100 × 200 = 30. Quick method: 10% of 200 = 20. 5% = 10. So 15% = 20+10 = 30. Break percentage into 10% and 5%!",shortcut:"10% of 200=20, 5% of 200=10. Add: 15%=30. Break-and-add method!"},

    {q:"The sum of first n natural numbers formula is:",opts:["n²","n(n+1)/2","n(n-1)/2","2n"],ans:1,diff:"medium",
    trick:"CONCEPT: Sum of 1+2+3+...+n = n(n+1)/2. Test: 1+2+3+4+5 = 15. Formula: 5×6/2 = 15 ✓. This formula appears in MUET frequently!",shortcut:"Sum 1 to n = n(n+1)/2. Test with 5: 5×6/2=15. Always works!"},

    {q:"If a triangle has angles 60° and 70°, the third angle is:",opts:["50°","60°","70°","80°"],ans:0,diff:"easy",
    trick:"CONCEPT: Sum of triangle angles = 180°. Third angle = 180 - 60 - 70 = 50°. Always: add known angles, subtract from 180.",shortcut:"3rd angle = 180 - (sum of other two). 180-60-70=50°!"},

    {q:"Simplify: (x³)(x⁴)",opts:["x⁷","x¹²","x","x⁻¹"],ans:0,diff:"easy",
    trick:"CONCEPT: When multiplying same base — ADD the exponents. x³ × x⁴ = x^(3+4) = x⁷. Simple addition of powers!",shortcut:"Same base multiplication = ADD powers. x³×x⁴=x⁷!"},

    {q:"What is the value of sin(90°)?",opts:["0","1/2","√3/2","1"],ans:3,diff:"easy",
    trick:"CONCEPT: Key trig values: sin(0°)=0, sin(30°)=½, sin(45°)=√2/2, sin(60°)=√3/2, sin(90°)=1. At 90°, sin reaches its maximum = 1.",shortcut:"sin(0°)=0, sin(90°)=1, cos(0°)=1, cos(90°)=0. Opposites at 0 and 90!"},

    {q:"A line has slope 2 and passes through (0,3). Its equation is:",opts:["y=2x","y=2x+3","y=3x+2","y=x+2"],ans:1,diff:"medium",
    trick:"CONCEPT: Slope-intercept form: y = mx + c. m = slope = 2. c = y-intercept = 3 (where line crosses y-axis). So y = 2x + 3. Just plug slope and intercept in!",shortcut:"y=mx+c. Slope=m=2, y-intercept=c=3. So y=2x+3!"},

    {q:"What is ²⁷/³ equal to?",opts:["3","6","9","27"],ans:2,diff:"easy",
    trick:"CONCEPT: 27/3 = 9. Simple division. But if written as 27^(1/3) that would be cube root = 3. Make sure you read what's being asked. 27÷3 = 9.",shortcut:"27÷3=9. Basic division!"},

    {q:"The volume of a cube with side 3 cm is:",opts:["9 cm³","18 cm³","27 cm³","81 cm³"],ans:2,diff:"easy",
    trick:"CONCEPT: Volume of cube = side³ = s × s × s. 3 × 3 × 3 = 27 cm³. For cube: cube the side length!",shortcut:"Cube volume = s³. Side=3 → 3³=27 cm³!"},

    {q:"What is the HCF of 12 and 18?",opts:["3","4","6","9"],ans:2,diff:"easy",
    trick:"CONCEPT: HCF = Highest Common Factor. Factors of 12: 1,2,3,4,6,12. Factors of 18: 1,2,3,6,9,18. Common: 1,2,3,6. Highest = 6.",shortcut:"HCF(12,18)=6. List factors, find highest common one!"},

    {q:"If log₂(x) = 3, then x = ?",opts:["6","8","9","16"],ans:1,diff:"medium",
    trick:"CONCEPT: log₂(x)=3 means 2³=x. Log asks 'what power?' — flip it: base^power = number. 2³ = 8.",shortcut:"log₂(x)=3 → 2³=x → x=8. Flip: base^power=number!"},

    {q:"What is the distance formula between (0,0) and (3,4)?",opts:["5","7","12","25"],ans:0,diff:"medium",

// ============ APP LOGIC ============
let cur=0, qi=0, answered=false;
let scores=[0,0,0,0], atts=[0,0,0,0], done=[false,false,false,false];
const SUBS=["Physics","Maths","Chemistry","English"];

function showSection(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  event.target.classList.add('active');
}

// FORMULAS
function buildFormulas(){
  const container=document.getElementById('formula-container');
  const grouped={Physics:[],Maths:[],Chemistry:[]};
  FORMULAS.forEach(f=>grouped[f.sub]&&grouped[f.sub].push(f));
  let html='';
  ['Physics','Maths','Chemistry'].forEach(sub=>{
    html+=`<div class="section-title" style="margin-top:1rem">${sub==='Physics'?'⚡':sub==='Maths'?'📐':'🧪'} ${sub} Formulas</div><div class="formula-grid" data-sub="${sub}">`;
    grouped[sub].forEach(f=>{
      html+=`<div class="f-card" data-name="${f.name.toLowerCase()} ${f.formula.toLowerCase()}">
        <div class="f-subject">${f.sub}</div>
        <div class="f-formula">${f.formula}</div>
        <div class="f-name">${f.name}</div>
        <div class="f-trick">${f.trick}</div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

function filterFormulas(val){
  const v=val.toLowerCase();
  document.querySelectorAll('.f-card').forEach(card=>{
    const text=card.dataset.name;
    card.style.display=(!v||text.includes(v))?'':'none';
  });
}

// BASICS
function buildBasics(){
  const container=document.getElementById('basics-container');
  let html='';
  BASICS.forEach(b=>{
    html+=`<div style="background:white;border-radius:12px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 2px 6px rgba(0,0,0,.08)">
      <div class="section-title">${b.subject==='Physics'?'⚡':b.subject==='Maths'?'📐':b.subject==='Chemistry'?'🧪':'📝'} ${b.title}</div>
      <ol style="margin-top:.8rem;padding-left:1.2rem">`;
    b.items.forEach(item=>{
      html+=`<li style="font-size:13px;color:#333;line-height:1.7;margin-bottom:4px">${item}</li>`;
    });
    html+='</ol></div>';
  });
  container.innerHTML=html;
}

// MCQ
function qs(){return MCQ[SUBS[cur]];}

function goSub(i){
  cur=i;qi=0;answered=false;
  document.querySelectorAll('.s-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  updateStats();render();
}

function updateStats(){
  const total=qs().length;
  const pct=atts[cur]>0?Math.round(scores[cur]/atts[cur]*100):0;
  document.getElementById('s-att').textContent=atts[cur]+'/'+total;
  document.getElementById('s-cor').textContent=scores[cur];
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('prog').style.width=(atts[cur]/total*100)+'%';
}

function render(){
  const sa=document.getElementById('score-area'),qa=document.getElementById('quiz-area');
  const total=qs().length;
  if(done[cur]||qi>=total){
    qa.classList.add('hidden');sa.classList.remove('hidden');
    const pct=Math.round(scores[cur]/total*100);
    const emoji=pct>=80?'🎉':pct>=60?'👍':'💪';
    const msg=pct>=80?'Excellent! 80%+ achieved!':pct>=60?'Good! Practice more!':'Keep going! You can do it!';
    sa.innerHTML=`<div class="score-card">
      <div style="font-size:44px;margin-bottom:8px">${emoji}</div>
      <div class="score-big">${scores[cur]}/${total}</div>
      <div class="score-msg">${msg}</div>
      <p style="font-size:13px;color:#888;margin-bottom:1.2rem">Score: ${pct}% — ${SUBS[cur]}</p>
      <button class="retry-btn" onclick="resetSub()">Try Again</button>
      <button class="back-btn" onclick="goSub((cur+1)%4)">Next Subject →</button>
    </div>`;
    return;
  }
  sa.classList.add('hidden');qa.classList.remove('hidden');
  const q=qs()[qi];
  const diffClass='diff-'+(q.diff||'medium');
  const diffText=(q.diff||'medium').charAt(0).toUpperCase()+(q.diff||'medium').slice(1);
  let html=`<div class="q-card">
    <div class="q-meta">
      <span class="badge">${SUBS[cur]}</span>
      <span class="diff-badge ${diffClass}">${diffText}</span>
      <span style="font-size:11px;color:#888">Q${qi+1}/${qs().length}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="opts">`;
  q.opts.forEach((o,i)=>{html+=`<button class="opt" id="o${i}" onclick="pick(${i})">${String.fromCharCode(65+i)}.&nbsp;${o}</button>`;});
  html+=`</div>
    <div class="trick-box" id="tb">
      <div class="trick-title">💡 Concept + Trick</div>
      <div class="trick-body">${q.trick}<br><br><span class="shortcut-pill">${q.shortcut}</span></div>
    </div>
  </div>
  <div class="nav-row">
    <span class="q-counter">${SUBS[cur]} — Q${qi+1}/${qs().length}</span>
    <button class="next-btn" id="nb" onclick="nextQ()">Next →</button>
  </div>`;
  qa.innerHTML=html;
}

function pick(i){
  if(answered)return;
  answered=true;atts[cur]++;
  const q=qs()[qi];
  if(i===q.ans)scores[cur]++;
  for(let j=0;j<q.opts.length;j++){
    const b=document.getElementById('o'+j);
    if(j===q.ans)b.classList.add('correct');
    else if(j===i&&i!==q.ans)b.classList.add('wrong');
    b.onclick=null;
  }
  document.getElementById('tb').style.display='block';
  document.getElementById('nb').style.display='inline-block';
  updateStats();
}

function nextQ(){qi++;answered=false;if(qi>=qs().length)done[cur]=true;render();}
function resetSub(){qi=0;answered=false;scores[cur]=0;atts[cur]=0;done[cur]=false;updateStats();render();}

buildFormulas();
buildBasics();
updateStats();
render();
</script>
</body>
</html>
